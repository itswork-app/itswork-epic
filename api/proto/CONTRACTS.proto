syntax = "proto3";

package itswork.intelligence;

option go_package = "itswork.app/api/proto";

service IntelligenceService {
  rpc AnalyzeToken (TokenRequest) returns (VerdictResponse);
}

message TokenRequest { 
  string mint_address = 1; 
  string creator_address = 2; 
  int32 creator_wallet_age_hours = 3;
  bool is_lp_burned = 4;
  float top_10_holder_concentration_percent = 5;
  bool funding_source_check_passed = 6;
  bool is_renounced = 7;
  bool has_socials = 8;
}

message VerdictResponse { 
  int32 score = 1; 
  string verdict = 2; 
  string reason = 3; 
}
